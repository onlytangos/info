<html lang='es'>
<head>
<meta charset='UTF-8'>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OTI</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
body{
	font-family: system-ui, sans-serif;
}
select, input, table {
    font-family: inherit;
    font-size: inherit;
    -webkit-appearance: none;
    appearance: none;
}
.azul{
   color: blue;
}
#sumario{
    text-align: left;
    vertical-align: baseline;
}
#sumario span {
    position: relative;
    top: 2px;
}
.cTabla {
    width:90%;
    overflow-x: auto;
    font-size:10px;
}
.cTabla table {
    text-align: center;
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
}
.cTabla tr {
    height: 46px;
}
.cTabla td, .cTabla th {
    border: 1px solid #ccc;
    padding: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}
.cTabla th {
    background: #f2f2f2;
}
.cTabla td:first-child {
    /* columna venue: texto completo, salto de linea por palabra */
    white-space: normal;
    overflow-wrap: break-word;
    overflow: visible;
    text-overflow: clip;
}
.datos{
	position:relative;
	top:-1px;
}
img{
	width:12px;
}
h3{
	margin: 0px 20px 0px 0px ;
	color: #222;
	font-size:16px;
	float: left;
}
h4{
	margin: 0px 40px 0px 0px ;
	color: #666;
	float: right;
}
select{
	width: 100px;
	margin: 0px 8px 0px 0px;
	padding: 4px;
	font-size: 14px;
}
.stipo{
	width: 18px;
	padding-right: 4px;
	padding-left: 4px;
}
.stipo2{
	border-radius:0px 8px 8px 0px;
	width: 100px;
	height: 18px;
}
.stipo3{
	border-radius: 0px 10px 10px 0px;
	display: inline-flex;
	width: 65px;
	height: 16px;
	overflow: hidden;
	white-space: nowrap;
	z-index:9;
	padding-right:8px;
	padding-left:8px;
}
.stipo4{
	border-radius:0px 10px 10px 0px;
	display: inline-block;
	width: 80px;
	height: 16px;
	overflow: hidden;
	white-space: nowrap;
	z-index:9;
	padding-right:8px;
	padding-left:8px;
}
.sCity{
	display: inline-flex;
	width: 90px;
	height: 14px;
	overflow: hidden;
	white-space: nowrap;
}
.fechaCompacta{
	color:#444;
	padding-right:6px;
	padding-left:2px;
}
.itemLinea{
	display: inline;
}
a:link,a:visited,a:focus,a:active{
	text-decoration: none;
}
a#link:hover{
	margin-left:3px;
}
a#link{
	width:15px;
	position:relative;
	top:3px;
	z-index:0;
}
.iconoUrl{
	position:relative;
	top:1px;
}
#titulo1{
	text-align: left;
}
#titulo2{
	font-size:14px;
	text-align: left;
}
.cuenta{
	color: #AAA;
}
#fijo{
	background: #fff;
	position: fixed;
	top: 0px;
	left: 0px;
	width: 160px;
	height: 100%;
	padding: 10px 8px 12px 10px;
	z-index: 999;
	box-shadow: 2px 0px 6px 0px rgba(0, 0, 0, 0.3);
	overflow-y: auto;
	box-sizing: border-box;
}
#fijo select{
	width: 100%;
	margin: 0px 0px 8px 0px;
	display: block;
}
#buscador{
	width: 100%;
	box-sizing: border-box;
	margin: 0px 0px 10px 0px;
	padding: 4px;
	font-size: 14px;
	-webkit-appearance: auto;
	appearance: auto;
}
#fijo h3{
	float: none;
	margin: 0px 0px 4px 0px;
}
#fijo h4{
	float: none;
	margin: 0px 0px 8px 0px;
}
#resultados{
	font-family: "Noto Sans Mono", monospace;
	font-size:12px;
	margin: 0px 0px 0px 130px;
}

/* ── Responsive: pantallas de móvil ──
   La barra de selectores (#fijo) deja de estar fija a la izquierda y pasa a
   flujo normal arriba, a todo el ancho; los resultados (#resultados) se
   desplazan debajo, sin el margen-izquierdo reservado para la barra fija. */
@media (max-width: 768px) {
	#fijo{
		position: static;
		width: 100%;
		height: auto;
		box-shadow: 0px 2px 6px 0px rgba(0, 0, 0, 0.3);
	}
	#fijo select{
		display: inline-block;
		width: calc(50% - 8px);
		vertical-align: top;
	}
	#fijo select:nth-of-type(odd){
		margin-right: 8px;
	}
	#buscador{
		display: block;
		width: 100%;
	}
	#resultados{
		margin: 12px 0px 0px 0px;
	}
	.cTabla{
		width: 100%;
	}
}
</style>

<script id='fuente1' src='publicEvent.out.js'></script>
<script id='fuente2' src='publicPeople.out.js'></script>
<script id='fuente3' src='privatePeople.out.js'></script>

<script>
// ---------------------------------------------------------------------------
// OnlyTangoInfo: web estatica que lista eventos y gente de tango.
// Los datos llegan en *.out.js como arrays de 8 campos (indices colX).
// Tres vistas: countries (todo), annual (eventos EVT con fecha) y regular (REG).
// ---------------------------------------------------------------------------

// indices de los 8 campos de cada fila de datos
const colArea=0;
const colPais=1;
const colCiudad=2;
const colTipo=3;
const colNombre=4;
const colAutor=5;
const colFecha=6;
const colUrl=7;

const meses=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
const opcionesVistas=['countries','annual','regular'];

// textos por defecto de cada selector
const fsel0='- all area';
const fsel1='- all country';
const fsel2='- all city';
const fsel3='- all type';
const fsel4='- all dates';
const fsel5=opcionesVistas[0];

// estado global
var datos=[];
var datosAll=[];
var busqueda='';
var colorTipo=new Map();
var titulo1,titulo2;
var parametros={};
var ocultar='';
var app;

const MAXSEL=13;

function borraParametros() {
	// Limpia los parametros de la URL visible una vez ya leidos en parametros{}.
	const url = new URL(window.location.href);
	if (url.search) {
		url.search = '';
		window.history.replaceState(null, document.title, url.toString());
	}
}

function readParam(){
	// Vuelca los parametros de la URL en parametros{} y rellena los que falten
	// con sus valores por defecto (app=mundo, vista=countries, etc.).
	const params = new URLSearchParams(window.location.search);
	for (const [clave, valor] of params.entries()) {
		parametros[clave] = valor;
	}
	const defecto={app:'mundo',area:fsel0,pais:fsel1,ciudad:fsel2,tipo:fsel3,fecha:fsel4,vista:fsel5};
	for (const clave in defecto){
		if (parametros[clave]==undefined){ parametros[clave]=defecto[clave]; }
	}
}

function inicio(){
	// Punto de entrada (window.onload): elige el dataset segun app, define los
	// colores por tipo, monta el menu lateral con los selectores y pinta el
	// primer listado.
	readParam();
	app=parametros.app;
	if (app=='mundo'){
		datos=publicEvent.concat(publicPeople);
		titulo1='OnlyTangoInfo';
		titulo2='<a href="https://www.facebook.com/profile.php?id=100093497583670" target="_blank">by KoKoTango</a>';
		colorTipo.set('listevents','#ead764');
		colorTipo.set('address','#ffd469');
		colorTipo.set('milonga','#adf5d7');
		colorTipo.set('listmilongas','#aFf5d7');
		colorTipo.set('venue','#fae3ad');
		colorTipo.set('event','#e5f9ff');
		colorTipo.set('event party','#d7f6fa');
		colorTipo.set('event festival','#c3e8ff');
		colorTipo.set('event encuentro','#7db1ff');
		colorTipo.set('event marathon','#acccfc');
		colorTipo.set('event championship','#ff6961');
		colorTipo.set('dj','#db94ff');
		colorTipo.set('artist','#e4ddff');
		colorTipo.set('organizer','#ebc4ff');
		colorTipo.set('writer','#f9fea0');
	}
	if(app=='people'){
		datos=privatePeople.concat(publicPeople);
		titulo1=`People &#128518; `;
		titulo2='';
		colorTipo.set('dj','#db94ff');
		colorTipo.set('artist','#e4adff');
		colorTipo.set('organizer','#ccffcc');
		colorTipo.set('tanguera','#ffccff');
		colorTipo.set('tanguero','#ffcccc');
		colorTipo.set('writer','#F9EE90');
		colorTipo.set('adviser','#F9AA90');
		colorTipo.set('shopper','#cfe8ff');
	}
	datosAll=datos;

	const body=document.body;
	const fijo=document.createElement('div');
	fijo.id='fijo';
	body.appendChild(fijo);
	const tt1=document.createElement('div');
	tt1.id='titulo1';
	tt1.innerHTML=titulo1;
	const tt2=document.createElement('div');
	tt2.id='titulo2';
	tt2.innerHTML=titulo2+'<br/><br/>';
	fijo.appendChild(tt1);
	fijo.appendChild(tt2);
	const sumario=document.createElement('div');
	sumario.id='sumario';
	fijo.appendChild(sumario);

	if (app=='mundo' || app=='people'){
		crearBuscador(fijo);
		setParametrosSelectores(fijo);
		setSel();
	}

	const results=document.createElement('ul');
	results.id='resultados';
	results.style.marginTop='10px';
	body.appendChild(results);
	renderGo();
	borraParametros();
}

function setParametrosSelectores(fijo){
	// Crea en cadena todos los selectores del menu (vista, area, pais, ciudad,
	// tipo, fechas) y aplica a cada uno el valor que venga en los parametros.
	if (app!='people'){
		fijo.appendChild(crearSel5());
		cambiarValorSelector('selector5',parametros.vista);
	}
	fijo.appendChild(crearSelAreas());
	cambiarValorSelector('selector0',parametros.area);
	fijo.appendChild(crearSel1());
	crearSelCountry();
	cambiarValorSelector('selector1',parametros.pais);
	fijo.appendChild(crearSel2());
	crearSelCity();
	cambiarValorSelector('selector2',parametros.ciudad);
	fijo.appendChild(crearSel3());
	crearSelType();
	cambiarValorSelector('selector3',parametros.tipo);
	if (app!='people'){
		fijo.appendChild(crearSel4());
		crearSelDates();
		cambiarValorSelector('selector4',parametros.fecha);
	}
}

function cambiarValorSelector(idSelector, nuevoValor) {
	// Selecciona nuevoValor en el selector dado solo si esa opcion existe;
	// si no, lo deja como esta (sin lanzar error).
	const selector=document.getElementById(idSelector);
	if (!selector || !nuevoValor){return}
	for (const option of selector.options) {
		if (option.value===nuevoValor){
			selector.value=nuevoValor;
			return;
		}
	}
}

function crearSel5(){
	// Crea el selector de vista (selector5): countries / annual / regular.
	let select=document.createElement('select');
	select.id='selector5';
	select.addEventListener('change',change5);
	const lista=opcionesVistas;
	lista.forEach(x => {
		const opt=document.createElement('option');
		opt.value=x;
		opt.textContent='by '+x;
		select.appendChild(opt);
	});
	return select;
}

function crearSel4(){
	// Crea el selector de fechas/meses (selector4) vacio; lo llena crearSelDates.
	let select=document.createElement('select');
	select.id='selector4';
	select.addEventListener('change',change4);
	return select;
}

function crearSel3(){
	// Crea el selector de tipo (selector3) vacio; lo llena crearSelType.
	let select=document.createElement('select');
	select.id='selector3';
	select.addEventListener('change',change3);
	return select;
}

function crearSel2(){
	// Crea el selector de ciudad (selector2) vacio; lo llena crearSelCity.
	let select=document.createElement('select');
	select.id='selector2';
	select.addEventListener('change',change2);
	return select;
}

function crearSel1(){
	// Crea el selector de pais (selector1) vacio; lo llena crearSelCountry.
	let select=document.createElement('select');
	select.id='selector1';
	select.addEventListener('change',change1);
	return select;
}

function esc(s){
	// Escapa &, < y > de un texto antes de meterlo en innerHTML (evita romper
	// el maquetado o inyectar HTML desde los datos).
	return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function opTxt(t,n){
	// Etiqueta de una opcion de selector: recorta el texto con '..' si pasa de
	// MAXSEL y le añade el contador (n) entre parentesis.
	let s=String(t);
	if (s.length>MAXSEL){ s=s.slice(0,MAXSEL-2)+'..'; }
	return (n!=undefined) ? s+' ('+n+')' : s;
}

function createOpt(s,v,t,n){
	// Crea una <option> (value=v, etiqueta=opTxt(t,n)) y la añade al select s.
	const opt=document.createElement('option');
	opt.value=v;
	opt.textContent=opTxt(t,n);
	s.appendChild(opt);
}

function get3(a){
	// Codigo de 3 letras para un tipo de evento (ej. 'event festival' -> 'FES').
	// 'event' devuelve 'EVT'; rellena con '-' si tiene menos de 3 letras.
	if (a=='event'){
		return 'EVT';
	}
	let b=a.replace('event','').trim();
	return b.slice(0,3).toUpperCase().padEnd(3, '-');
}

function addTiposEvento(select,cuentas,conPrefijo){
	// Añade una <option> por cada tipo de evento (event/venue/milonga) presente
	// en 'cuentas', en orden alfabetico. Compartido por las vistas countries y
	// annual; 'conPrefijo' antepone el codigo de 3 letras (ej. 'MAR.marathon').
	const esEvento = x => ['event','venue','milonga'].includes(x.split(' ')[0]);
	claves(cuentas).forEach(x => {
		if (x=='event' || !esEvento(x)){return}
		let y=x.replace('event ','').trim();
		if (y=='championship'){y='champion'}
		createOpt(select,x,conPrefijo?get3(y)+'.'+y:y,cuentas.get(x)||0);
	});
}

function crearSelType(){
	// Rellena el selector de tipo (selector3) segun app y vista:
	//  - mundo/annual: los tipos de evento EVT presentes en los datos.
	//  - mundo/otras : eventos (codigo de 3 letras) y luego roles de people.
	//  - people      : los roles tal cual.
	let vista='';
	if (document.getElementById('selector5')!=undefined){
		vista=document.getElementById('selector5').value
	}
	let select=document.getElementById('selector3');
	select.innerHTML='';

	let optionDefault=document.createElement('option');
	optionDefault.value='';
	optionDefault.textContent=fsel3;
	select.appendChild(optionDefault);

	if (app=='mundo'){
		if (vista=='annual'){
			// Tipos EVT obtenidos dinamicamente de los datos (misma fuente que el
			// contador, asi nunca se desincronizan). Antes estaban hardcodeados y
			// salia 'party(0)' y faltaban seminar/championship.
			addTiposEvento(select,cuentaTipoEVT(),false);
		}else{
			let cuentas=cuentaCol2(colTipo);
			const esEvento = x => ['event','venue','milonga'].includes(x.split(' ')[0]);
			createOpt(select,'event','event*',sumaCuenta(cuentas,'event'));
			addTiposEvento(select,cuentas,true);
			createOpt(select,rolesPeople.join(','),'people*',cuentaFilasTipo(rolesPeople.join(',')));
			claves(cuentas).forEach(x => {
				if (esEvento(x)){return}
				createOpt(select,x.split(' ')[0],x,cuentas.get(x)||0);
			})
		}
	}else if (app=='people'){
		let cuentas=cuentaCol2(colTipo);
		let lista=claves(cuentas);
		lista.forEach(x => {
			if (!x || x=='-'){return}
			const opt=document.createElement('option');
			opt.value=x;
			opt.textContent=opTxt(x,cuentas.get(x)||0);
			select.appendChild(opt);
		});
	}else{
		let cuentas=cuentaCol2(colFecha);
		let lista=claves(cuentas);
		lista.forEach(x => {
			if (x[0]=='('){return}
			const opt=document.createElement('option');
			opt.value=x;
			opt.textContent=opTxt(x,cuentas.get(x)||0);
			select.appendChild(opt);
			}
		)
	}
}

function poblarAreas(select){
	// Vacia y rellena el selector de area con sus valores y contadores.
	select.innerHTML='';
	let optionDefault=document.createElement('option');
	optionDefault.value='';
	optionDefault.textContent=fsel0;
	select.appendChild(optionDefault);
	let cuentas=cuentaCol(colArea);
	claves(cuentas).forEach(x => {
		const opt=document.createElement('option');
		opt.value=x;
		opt.textContent=opTxt(x,cuentas.get(x)||0);
		select.appendChild(opt);
	});
}

function crearSelAreas(){
	// Crea el selector de area (selector0) ya relleno.
	let select=document.createElement('select');
	select.id='selector0';
	poblarAreas(select);
	select.addEventListener('change',change0);
	return select;
}

function repoblarAreas(){
	// Vuelve a llenar el selector de area existente (tras buscar o cambiar de vista).
	poblarAreas(document.getElementById('selector0'));
}

function crearBuscador(fijo){
	// Crea la caja de busqueda. Texto normal filtra en vivo todos los campos;
	// texto que empieza por '-' es un comando que se ejecuta al pulsar Enter.
	const inp=document.createElement('input');
	inp.id='buscador';
	inp.type='search';
	inp.placeholder='buscar...';
	inp.addEventListener('input',aplicarBusqueda);
	inp.addEventListener('keydown',function(e){
		if (e.key=='Enter'){
			let txt=inp.value.trim();
			if (txt.startsWith('-')){ ejecutaComando(txt.toLowerCase()); }
		}
	});
	fijo.appendChild(inp);
}

function aplicarBusqueda(){
	// Filtra datosAll por el texto del buscador (todas las palabras deben
	// aparecer en algun campo) y reajusta los selectores. Si empieza por '-'
	// es un comando y no se busca.
	const inp=document.getElementById('buscador');
	let txt=inp ? inp.value.trim() : '';
	if (txt.startsWith('-')){
		return;
	}
	busqueda=txt.toLowerCase();
	if (busqueda==''){
		datos=datosAll;
	}else{
		let terms=busqueda.split(/\s+/).filter(Boolean);
		datos=datosAll.filter(fila => {
			let hay=fila.join(' ').toLowerCase();
			return terms.every(t => hay.indexOf(t)!=-1);
		});
	}
	recargarSelectores();
}

function recargarSelectores(){
	// Reajusta todos los selectores al dataset activo, resetea el area y repinta.
	repoblarAreas();
	document.getElementById('selector0').value='';
	crearSelCountry();
	crearSelCity();
	if (app!='people'){ crearSelDates(); }
	setSel();
	renderGo();
}

function ejecutaComando(cmd){
	// Despacha los comandos del buscador (texto que empieza por '-').
	if (cmd=='-reset'){ comandoReset(); }
}

function comandoReset(){
	// Comando '-reset': vacia la busqueda y deja todos los selectores y la
	// vista en sus valores por defecto.
	const inp=document.getElementById('buscador');
	if (inp){ inp.value=''; }
	busqueda='';
	datos=datosAll;
	const sel5=document.getElementById('selector5');
	if (sel5){ sel5.value=fsel5; }
	recargarSelectores();
}

function crearSelCountry(){
	// Rellena el selector de pais (selector1) con los paises del area elegida
	// (o todos), con sus contadores segun la vista activa.
	let area=document.getElementById('selector0').value;
	let select=document.getElementById('selector1');
	select.innerHTML='';
	let optionDefault=document.createElement('option');
	optionDefault.value='';
	optionDefault.textContent=fsel1;
	select.appendChild(optionDefault);
	let cuentas= area=='' ? cuentaCol(colPais) : cuentaCol1(colPais,colArea,area);
	claves(cuentas).forEach(x => {
		if (x=='.'||x=='-'){return}
		createOpt(select,x,x,cuentas.get(x)||0);
	});
}

function crearSelCity(){
	// Rellena el selector de ciudad (selector2) con las ciudades del pais o
	// area elegidos (o todas), con contadores segun la vista activa.
	let pais=document.getElementById('selector1').value;
	let area=document.getElementById('selector0').value;
	let select=document.getElementById('selector2');
	select.innerHTML='';
	var optionDefault=document.createElement('option');
	optionDefault.value='';
	optionDefault.textContent=fsel2;
	select.appendChild(optionDefault);
	let cuentas;
	if (pais!=''){ cuentas=cuentaCol1(colCiudad,colPais,pais); }
	else if (area!=''){ cuentas=cuentaCol1(colCiudad,colArea,area); }
	else { cuentas=cuentaCol(colCiudad); }
	claves(cuentas).forEach(x => {
		if (x=='.'||x=='-'){return}
		createOpt(select,x,x,cuentas.get(x)||0);
	});
}

function crearSelDates(){
	// Rellena el selector de meses (selector4) con los 12 meses y cuantos
	// eventos caen en cada uno (cuentaFechas), respetando los filtros activos.
	let select=document.getElementById('selector4');
	select.innerHTML='';
	var optionDefault=document.createElement('option');
	optionDefault.value='';
	optionDefault.textContent=fsel4;
	select.appendChild(optionDefault);
	let lista=meses;
	let cuentas=cuentaFechas();
	lista.forEach(x => {
		if(x==''||x=='-'){return}
		const opt=document.createElement('option');
		opt.value=x;
		opt.textContent=opTxt(x,cuentas.get(x)||0);
		select.appendChild(opt);
	});
}

function claves(m){
	// Claves de un Map (cuentaCol*) ordenadas alfabeticamente = los valores
	// unicos de un selector. Misma fuente que su contador, asi lista y contador
	// nunca se desincronizan. No se trocea por espacios (hay 'South Korea').
	return [...m.keys()].sort();
}

function damecol(col1){
	// Lista ordenada de valores unicos de una columna (sin contador).
	return claves(cuentaCol(col1));
}

function damecol1(col,col1,v1){
	// Lista ordenada de valores unicos de col en las filas donde col1==v1.
	return claves(cuentaCol1(col,col1,v1));
}

function prefijoVista(){
	// Prefijo de fecha que define que filas cuentan segun la vista: 'REG'
	// (regular), 'EVT' (annual) o '' (countries, todas).
	const vista=valorVisible('selector5');
	if (vista=='regular'){return 'REG'}
	if (vista=='annual'){return 'EVT'}
	return '';
}

const rolesPeople=['dj','artist','organizer','writer','shopper','adviser','tanguera','tanguero'];

function filaEnVista(fila,pref){
	// true si la fila pertenece a la vista activa (REG/EVT comparan el
	// prefijo de fecha; '' acepta todas).
	if (pref==''){return true}
	return String(fila[colFecha]).split('.')[0]==pref;
}

function cuentaCol(col1){
	// Map valor->ocurrencias de una columna, contando solo las filas de la
	// vista activa (prefijoVista).
	const pref=prefijoVista();
	const m=new Map();
	for (const fila of datos){
		if (!filaEnVista(fila,pref)){continue}
		const v=fila[col1];
		if (v!=''){ m.set(v,(m.get(v)||0)+1); }
	}
	return m;
}

function cuentaCol1(col,col1,v1){
	// Como cuentaCol pero solo las filas donde col1==v1 (o v1=='all').
	const pref=prefijoVista();
	const m=new Map();
	for (const fila of datos){
		if (!filaEnVista(fila,pref)){continue}
		if (v1=='all' || fila[col1]==v1){
			const v=fila[col];
			if (v!=''){ m.set(v,(m.get(v)||0)+1); }
		}
	}
	return m;
}

function cuentaCol2(col){
	// Map valor->ocurrencias de una columna filtrando por el pais (selector1)
	// y la ciudad (selector2) elegidos; trocea el campo por comas.
	let v1=document.getElementById('selector1').value;
	let v2=document.getElementById('selector2').value;
	let col1=colPais;
	let col2=colCiudad;
	const m=new Map();
	for (let i=0;i<datos.length;i++){
		if(v1=='all' || v1=='' || datos[i][col1]==v1){
			if(v2=='all' || v2=='' || datos[i][col2]==v2){
				let valor=datos[i][col].split(',');
				for (let k=0;k<valor.length;k++){
					if (valor[k]!=''){ m.set(valor[k],(m.get(valor[k])||0)+1); }
				}
			}
		}
	}
	return m;
}

function sumaCuenta(mapa, valorLista){
	// Suma las ocurrencias de un grupo de tipos. valorLista puede ser una lista
	// por comas ('artist,organizer') o un prefijo ('event').
	let total=0;
	let claves=valorLista.split(',');
	for (const [k,v] of mapa){
		if (claves.includes(k) || claves.includes(k.split(' ')[0])){ total+=v; }
	}
	return total;
}

function cuentaFilasTipo(valorLista){
	// Cuenta FILAS (no ocurrencias) cuyo tipo contiene alguno de los valores,
	// con los mismos filtros pais/ciudad que cuentaCol2 y el mismo criterio
	// de coincidencia que el render (filtra). Una persona con varios roles
	// cuenta una sola vez: el contador coincide con los resultados pintados.
	let v1=document.getElementById('selector1').value;
	let v2=document.getElementById('selector2').value;
	let total=0;
	for (let i=0;i<datos.length;i++){
		if(v1=='all' || v1=='' || datos[i][colPais]==v1){
			if(v2=='all' || v2=='' || datos[i][colCiudad]==v2){
				if (filtra(valorLista,datos[i][colTipo])!=-1){ total++; }
			}
		}
	}
	return total;
}

function cuentaTipoEVT(){
	// Contador para la vista annual: cuenta por tipo solo eventos EVT con
	// fecha, respetando el unico filtro visible en annual (el area).
	const v0=document.getElementById('selector0').value;
	const m=new Map();
	for (let i=0;i<datos.length;i++){
		if (v0!='' && v0!='all' && datos[i][colArea]!=v0){continue}
		let f=datos[i][colFecha];
		if (f=='-' || f==''){continue}
		if (f.split('.')[0]!='EVT'){continue}
		let t=datos[i][colTipo];
		if (t!=''){ m.set(t,(m.get(t)||0)+1); }
	}
	return m;
}

function cuentaFechas(){
	// Cuenta cuantos eventos caen en cada mes (3er campo de la fecha EVT),
	// respetando los filtros visibles (area, pais, ciudad, tipo). Las REG no
	// tienen mes y no se cuentan.
	let s0=valorVisible('selector0');
	let s1=valorVisible('selector1');
	let s2=valorVisible('selector2');
	let s3=valorVisible('selector3');
	const m=new Map();
	for (let i=0;i<datos.length;i++){
		let d=datos[i];
		if (s0!='' && s0!='all' && d[colArea]!=s0){continue}
		if (s1!='' && s1!='all' && d[colPais]!=s1){continue}
		if (s2!='' && s2!='all' && d[colCiudad]!=s2){continue}
		if (s3!='' && s3!='all' && filtra(s3,d[colTipo])==-1){continue}
		let mes=d[colFecha].split('.')[2];
		if (meses.indexOf(mes)!=-1){ m.set(mes,(m.get(mes)||0)+1); }
	}
	return m;
}

function getObj(i){
	// Convierte la fila i de datos (array de 8 campos) en un objeto con nombres.
	let o={
			pais:datos[i][colPais],
			ciudad:datos[i][colCiudad],
			tipo:datos[i][colTipo],
			nombre:datos[i][colNombre],
			autor:datos[i][colAutor],
			fechas:datos[i][colFecha],
			url:datos[i][colUrl],
	}
	return o;
}

function damelista(pais){
	// Devuelve, como objetos, todas las filas cuyo pais coincide, en orden.
	let res=[];
	for (let i=0;i<datos.length;i++){
		if (pais==datos[i][colPais]){
			res.push(getObj(i));
		}
	}
	return res;
}

function valorVisible(id){

	// vista devuelve '' para que no filtre.
	const e=document.getElementById(id);
	return (!e || e.style.display=='none') ? '' : e.value;
}

function renderGo(){

	render(valorVisible('selector0'),valorVisible('selector1'),valorVisible('selector2'),
	       valorVisible('selector3'),valorVisible('selector4'),valorVisible('selector5'));
}

function filtra(cadena1,cadena2){
	// Devuelve 1 si alguna palabra de cadena1 (lista por comas) aparece en
	// cadena2; si no, -1.
	let lista1=cadena1.split(',');
	for (const x of lista1){
		if (cadena2.indexOf(x)!=-1){
			return 1;
		}
	}
	return -1;
}

function borraTxt(cadena, palabrasAEliminar){
	// De una lista por comas, quita los elementos que aparezcan en
	// palabrasAEliminar y devuelve la lista resultante por comas.
	const lista = cadena.split(',').map(p => p.trim()).filter(p => p);
	const eliminar = palabrasAEliminar.split(',').map(p => p.trim()).filter(p => p);
	const resultado = lista.filter(p => !eliminar.includes(p));
	return resultado.join(',');
}

function listaPaises(s0,s1){
	// Paises a recorrer en el render segun el area (s0) y el pais (s1) elegidos.
	if (s1!='' && s1!='all'){ return [s1]; }
	return s0=='' ? damecol(colPais) : damecol1(colPais,colArea,s0);
}

function omitirPais(area,s0,s1,s2){
	// '-' y '.' son ubicaciones vacias (people.private): se muestran solo si no
	// hay ningun filtro activo; con filtro se omiten. Excepcion: si el propio
	// filtro de area pedido es '-', no se debe ocultar ese grupo.
	if (s0=='-'){return false}
	return (area=='-'||area=='.') && (s0!=''||s1!=''||s2!='');
}

function cabeceraPais(results,area){
	// Crea y añade la cabecera en negrita de un pais y la devuelve.
	const header=document.createElement('li');
	header.style.listStyleType='none';
	header.innerHTML=esc(area);
	header.style.fontWeight='bold';
	results.appendChild(header);
	return header;
}

function pasaFiltros(item,s2,s3,s4){
	// true si el item pasa los filtros de fecha (s4), tipo (s3) y ciudad (s2).
	if (s4!='' && s4!='all' && item.fechas.indexOf(s4)==-1){ return false; }
	if (s3!='' && s3!='all' && filtra(s3,item.tipo)==-1){ return false; }
	if (s2!='' && s2!='all' && s2!=item.ciudad){ return false; }
	return true;
}

function cierraCabecera(header,contadorL2){
	// Añade el contador a la cabecera del pais; si el grupo quedo vacio, la borra.
	header.innerHTML+='<span class="cuenta">&nbsp;('+contadorL2+')</span>';
	if (contadorL2==0){ header.parentNode.removeChild(header); }
}

function renderRegular(s0,s1,s2,s3,s4){
	// Vista regular: agrupa las milongas REG por pais, ciudad y venue y las
	// pinta en una tabla semanal (getTable). Devuelve el total de lineas.
	const results=document.getElementById('resultados');
	results.innerHTML='';
	let contadorL1=0;

	for (const area of listaPaises(s0,s1)) {
		if (omitirPais(area,s0,s1,s2)){continue}
		const entradas=damelista(area);
		if (entradas.length==0){continue}
		const header=cabeceraPais(results,area);
		let contadorL2=0;

		let porCiudad = new Map();
		for (const item of entradas) {

			if (!pasaFiltros(item,s2,s3,s4)){continue}

			let ciudad=item.ciudad;
			if (!porCiudad.has(ciudad)){
				porCiudad.set(ciudad, { mapa: new Map(), vistos: new Set() });
			}
			let { mapa, vistos } = porCiudad.get(ciudad);

			if (item.tipo=='venue'){
				if (!mapa.has(item.nombre)){ mapa.set(item.nombre,['','','','','','','','','']); }
				mapa.get(item.nombre)[7]=item.url;
			}
			if (item.fechas.split('.')[0]=='REG'){
				let venue=item.autor.split('#')[0];
				let hora=item.fechas.split('.')[4]||'';
				let diaTxt=item.fechas.split('.')[1];
				let clave=venue+'#'+diaTxt+'#'+hora+'#'+item.nombre;
				if (vistos.has(clave)){continue}
				vistos.add(clave);
				contadorL2+=1;
				contadorL1+=1;
				if (!mapa.has(venue)){
					mapa.set(venue,['','','','','','','','','']);
				}
				let valor=mapa.get(venue);
				if (diaTxt=='?'){
					// dia desconocido (REG.?.?.W.hora): 'consultar' en las
					// celdas de la semana, con la hora si la hay
					valor[8]=(valor[8]||'')+item.nombre+'|'+item.url+'|'+hora+'#';
				}else{
					valor[parseInt(diaTxt)]+=hora+'|'+item.nombre+'|'+item.url+'#';
				}
				mapa.set(venue,valor);
			} else if (item.tipo=='milonga'){
				// legado: milonga con fechas='' (sin dia ni hora): consultar
				let venue=item.autor.split('#')[0];
				let clave=venue+'#?#'+item.nombre;
				if (vistos.has(clave)){continue}
				vistos.add(clave);
				contadorL2+=1;
				contadorL1+=1;
				if (!mapa.has(venue)){
					mapa.set(venue,['','','','','','','','','']);
				}
				let valor=mapa.get(venue);
				valor[8]=(valor[8]||'')+item.nombre+'|'+item.url+'|'+'#';
				mapa.set(venue,valor);
			}
		}

		porCiudad.forEach(({ mapa }, ciudad) => {
			let tabla=getTable(mapa);
			if (tabla!=''){
				let caja=document.createElement('div');
				caja.className='cTabla';
				caja.innerHTML=esc(ciudad)+'<br/>'+tabla;
				results.appendChild(caja);
			}
		});

		cierraCabecera(header,contadorL2);
	}
	results.innerHTML+='<br/><br/>';
	return contadorL1;
}

function getTable(dataMap){
	// Construye la tabla semanal de una ciudad: una fila por venue y una
	// columna por dia (lunes a domingo). values[0..6] son los dias (0=domingo)
	// con bloques 'hora|nombre|url#'; values[7] es la url del venue.
	const ordenColumnas=[1,2,3,4,5,6,0];
	let filas=0;
	let html="<table>";
	html+="<tr><th>venue</th><th>monday</th><th>tuesday</th><th>wednesday</th><th>thursday</th><th>friday</th><th>saturday</th><th>sunday</th></tr>";

	for (const [venue, values] of dataMap) {
		// venue sin ninguna milonga (ni REG ni sin dia): no pintar fila vacia
		const sinDia=ordenColumnas.every(d => !values[d]);
		if (sinDia && !values[8]){continue}
		html+="<tr>";
		let vurl=values[7]||'';
		html+="<td>"+(vurl ? "<a href='"+esc(vurl)+"' target='_blank'>" : "")+esc(venue)+(vurl ? "</a>" : "");
		// milongas sin dia fijo: bajo el nombre del venue; sus horas (si las
		// hay) se acumulan para pintarlas con 'consultar' en las celdas
		let consultarCelda='';
		(values[8]||'').split('#').forEach(bloque => {
			if (bloque==''){return}
			let [nombre,url,hora]=bloque.split('|');
			url=url||''; hora=hora||'';
			html+="<br/>"+(url ? "<a href='"+esc(url)+"' target='_blank'>" : "")+
				"<span class='azul'>"+esc(nombre)+"</span>"+(url ? "</a>" : "")+" (?)";
			if (sinDia){
				consultarCelda+=(consultarCelda ? "<br/>" : "")+(hora ? hora+"<br/>" : "")+"consultar";
			}
		});
		html+="</td>";

		ordenColumnas.forEach(dia => {
			let lineas=[];
			(values[dia]||'').split('#').forEach(bloque => {
				if (bloque==''){return}
				let [hora,nombre,url]=bloque.split('|');
				url=url||'';
				let enlace=(url ? "<a href='"+esc(url)+"' target='_blank'>" : "")+
					"<span class='azul'>"+esc(nombre)+"</span>"+(url ? "</a>" : "");
				// sin hora: solo el nombre, sin linea vacia encima
				lineas.push(hora ? hora+"<br/>"+enlace : enlace);
			});
			// milonga sin dia: 'consultar' (con su hora si la hay) en cada celda
			html+="<td>"+(lineas.length ? lineas.join('<br/>') : (sinDia ? consultarCelda : ""))+"</td>";
		});
		html+="</tr>";
		filas+=1;
	}
	html+="</table>";
	return filas>0 ? html : '';
}

				esc(item.nombre)+',&nbsp;'+span3+'('+span4+')';

function renderAnnualCompact(s0,s1,s2,s3,s4){
	// Vista annual: lista solo eventos EVT ordenados por fecha. Los ya pasados
	// se reprograman al proximo año futuro; se colorea por mes y se agrupa el
	// dia bajo el mismo mes. Aplica los filtros area/pais/ciudad/tipo/fecha.
	const colorMes=[
	'#BFD7EA',
	'#E8C2CA',
	'#B4E197',
	'#F7E1D7',
	'#FFF1B5',
	'#FFD6A5',
	'#FFB3B3',
	'#F6D7B0',
	'#D0E6A5',
	'#E7BFB1',
	'#D1BFA7',
	'#C6D8FF',
	];

	const results=document.getElementById('resultados');
	results.innerHTML='';
	let contadorL1=0;
	let entradas=[];
	const area=s0;

	for (let i=0;i<datos.length;i++){

		if (
		      s0!='' &&
		      s0!='all' &&
		      (datos[i][colArea]!=s0)
		){continue}

		let o=getObj(i);
		let regular=o.fechas.split('.')[0];
		if ( regular!='EVT' ){continue}

		let fechas=o.fechas;
		if ( fechas=='-' || fechas=='' ){continue}

		const actual=new Date();
		let year=o.fechas.split('.')[4];
		const mes=parseInt(o.fechas.split('.')[1]);
		const dia=o.fechas.split('.')[3].split('-')[0];
		if (new Date(year,mes,dia)<actual){ year=actual.getFullYear(); }
		if (new Date(year,mes,dia)<actual){ year++; }
		const f3=new Date(year,mes,dia);
		o.ofecha=f3;
		o.colorMes=mes;

		o.pfecha=f3.getFullYear()+'.'+meses[f3.getMonth()]+' '+dia.toString().padStart(2, '0');
		o.pfecha2='&nbsp'.repeat(9)+dia.toString().padStart(2, '0');
		entradas.push(o);
	}

	entradas.sort(function(a, b){return a.ofecha-b.ofecha})

	let a3=s3.split(',');
	let mesAnterior=-1;
	for (const item of entradas) {

		if (
		      s4!='' &&
		      s4!='all' &&
		      (item.fechas.indexOf(s4)==-1)
		){continue}

		if (
		      s3!='' &&
		      s3!='all' &&
		      (a3.indexOf(item.tipo)==-1)
		){continue}

		if (
		      s2!='' &&
		      s2!='all' &&
		      s2!=item.ciudad
		){continue}

		if (
		      s1!='' &&
		      s1!='all' &&
		      s1!=item.pais
		){continue}

		contadorL1+=1;

		const li=document.createElement('li');
		li.style.listStyleType='circle';
		li.style.marginLeft='20px';

		const span=document.createElement('span');

		let tipo=item.tipo.replace('event ','').trim();
		if (tipo=='championship'){
			tipo='champion';
		}

		let stipo='';
		if (tipo!=''){
			stipo='<span class="stipo3" style="color:#444;background-color:'+colorTipo.get(item.tipo)+
			'">'+esc(tipo)+'&nbsp;</span>';
		}

		let span2='';
		if (item.autor!='') {
			span2='<span>'+esc(item.autor)+'</span>';
		}

		let fff=(item.colorMes==mesAnterior) ? item.pfecha2 : item.pfecha;
		mesAnterior=item.colorMes;

		let sfecha='';

		if (item.pfecha!='') {
			sfecha='<span class="fechaCompacta" style="background-color:'+colorMes[item.colorMes]+
			'">'+fff+'</span>';
		}

		let nombre=item.nombre;
		let corte= window.innerWidth/20;
		if (nombre.length>corte){
			nombre=nombre.substring(0,corte)+' ..';
		}
		let snombre='<span>'+esc(nombre)+'</span>';

		item.texto=sfecha+stipo+'&nbsp;'+snombre+'&nbsp;('+esc(item.ciudad)+','+esc(item.pais)+')';
		span.innerHTML=item.texto;
		li.appendChild(span);

		if (item.url) {
			const spot=document.createTextNode(' ');
			li.appendChild(spot);
			const link=document.createElement('a');
			link.href=item.url;
			link.innerHTML='<img class="iconoUrl" src="img/a2.png">';
			link.target='_blank';
			li.appendChild(link);
		}
		results.appendChild(li);
	}
	results.innerHTML+='<br/><br/>';
	return contadorL1;
}

function render(s0,s1,s2,s3,s4,s5){
	// Despacha a la vista activa (regular/annual/countries) y actualiza el
	// contador total del sumario.
	let contadorL1;
	if (s5=='regular'){
		contadorL1=renderRegular(s0,s1,s2,s3,s4);
	}else if (s5=='annual'){
		contadorL1=renderAnnualCompact(s0,s1,s2,s3,s4);
	}else{
		contadorL1=renderCountries(s0,s1,s2,s3,s4);
	}
	const sumario=document.getElementById('sumario');
	sumario.innerHTML='&#128202;<span>'+' total : '+contadorL1+'</span><br/><br/>';
}

window.onload=inicio;
